# ── Identificación de la aplicación ─────────────────────────────
spring.application.name=vivaeventos-gateway
app.version=0.0.1
app.api.version=v1

# ── Servidor HTTP ────────────────────────────────────────────────
server.port=8080

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw}

# ── Spring Cloud Gateway ─────────────────────────────────────────
# CORS manejado por el proxy Express del frontend

# ── Actuator ────────────────────────────────────────────────
management.server.port=8081
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=*

# ── Logging ─────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.web=INFO
logging.level.org.springframework.cloud.gateway=DEBUG

# ── JSON formateado ───────────────────────────────────────────────────
spring.jackson.serialization.indent-output=true

# ── Trazabilidad distribuida (Micrometer Tracing + Zipkin) ──────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
