# ── Identificación de la aplicación ─────────────────────────────
spring.application.name=vivaeventos-gateway
app.version=0.0.1
app.api.version=v1

# ── Servidor HTTP ────────────────────────────────────────────────
server.port=8080

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw}

# ── Spring Cloud Gateway ─────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[0]=http://localhost:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[1]=https://localhost:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[2]=http://192.168.*.*:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[3]=https://192.168.*.*:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[4]=https://*.devtunnels.ms
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[5]=https://*.devtunnels.ms:*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[6]=https://*.run.app
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns[7]=https://**.run.app
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[5]=PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ── Actuator ────────────────────────────────────────────────
management.server.port=8081
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=*

# ── Logging ─────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.web=INFO
logging.level.org.springframework.cloud.gateway=DEBUG

# ── JSON formateado ───────────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
