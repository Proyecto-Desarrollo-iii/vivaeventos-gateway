# ── Identificación de la aplicación ─────────────────────────────
spring.application.name=vivaeventos-gateway
app.version=0.0.1
app.api.version=v1

# ── Servidor HTTP ────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw}

# ── Spring Cloud Gateway ─────────────────────────────────────────
# CORS manejado por el proxy Express del frontend
spring.main.lazy-initialization=true

# ── Actuator ────────────────────────────────────────────────
management.server.port=${MANAGEMENT_SERVER_PORT:-1}
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ── Logging ─────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.web=INFO
logging.level.org.springframework.cloud.gateway=DEBUG

# ── JSON formateado ───────────────────────────────────────────────────
spring.jackson.serialization.indent-output=true

# ── Trazabilidad distribuida (Micrometer Tracing + Zipkin) ──────
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.0}
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:}

# ── Mapeo de Microservicios ──────────────────────────────────────
auth.uri=${AUTH_URI:http://localhost:8083}
events.uri=${EVENTS_URI:http://localhost:8081}
tickets.uri=${TICKETS_URI:http://localhost:8085}
orders.uri=${ORDERS_URI:http://localhost:8083}
payments.uri=${PAYMENTS_URI:http://localhost:8084}
checkin.uri=${CHECKIN_URI:http://localhost:8086}
notifications.uri=${NOTIFICATIONS_URI:http://localhost:8087}
audit.uri=${AUDIT_URI:http://audit:8089}
