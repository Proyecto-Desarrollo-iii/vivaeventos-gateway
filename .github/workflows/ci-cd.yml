name: CI/CD - vivaeventos-gateway

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Compile
        run: mvn clean compile
      - name: Run unit tests with coverage
        run: mvn verify
        env:
          JWT_SECRET: dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7
      - name: SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vivaeventos-gateway
            -Dsonar.organization=proyecto-desarrollo-iii
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  docker-build-and-push:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-cloud-run:
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/834797281102/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: cloud-run-admin@vivaeventos-498516.iam.gserviceaccount.com
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet
      - name: Pull from GHCR and push to GCR
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            gcr.io/vivaeventos-498516/vivaeventos-gateway:${{ github.ref_name }}
          docker push gcr.io/vivaeventos-498516/vivaeventos-gateway:${{ github.ref_name }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: vivaeventos-gateway
          image: gcr.io/vivaeventos-498516/vivaeventos-gateway:${{ github.ref_name }}
          region: us-central1
          env_vars: |
            SERVER_PORT=8080
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AUTH_URI=${{ secrets.AUTH_URI }}
            EVENTS_URI=${{ secrets.EVENTS_URI }}
            TICKETS_URI=${{ secrets.TICKETS_URI }}
            ORDERS_URI=${{ secrets.ORDERS_URI }}
            PAYMENTS_URI=${{ secrets.PAYMENTS_URI }}
            CHECKIN_URI=${{ secrets.CHECKIN_URI }}
            NOTIFICATIONS_URI=${{ secrets.NOTIFICATIONS_URI }}
            ANALYTICS_URI=${{ secrets.ANALYTICS_URI }}
            AUDIT_URI=${{ secrets.AUDIT_URI }}
